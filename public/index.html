<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1 Million CheckBoxes</title>
    <style>
      :root {
        --primary-bg: #0f172a;
        --secondary-bg: #1e293b;
        --accent-green: #10b981;
        --accent-hover: #059669;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --checkbox-bg: #334155;
        --checkbox-border: #475569;
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: var(--primary-bg);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      header {
        width: 100%;
        padding: 1.5rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: var(--secondary-bg);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-green);
        letter-spacing: -0.025em;
      }

      .auth-section {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      #user-info {
        font-size: 0.95rem;
        font-weight: 500;
        display: none;
      }

      .btn {
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
      }

      .btn-primary {
        background-color: var(--accent-green);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--accent-hover);
        transform: translateY(-1px);
      }

      .btn-outline {
        background-color: transparent;
        border: 1px solid var(--accent-green);
        color: var(--accent-green);
      }

      .btn-outline:hover {
        background-color: rgba(16, 185, 129, 0.1);
      }

      main {
        flex: 1;
        width: 100%;
        max-width: 1200px;
        padding: 2rem;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .status-banner {
        width: 100%;
        padding: 1rem;
        background-color: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 0.5rem;
        text-align: center;
        margin-bottom: 2rem;
        color: var(--accent-green);
        font-weight: 500;
        display: none;
      }

      #container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(24px, 1fr));
        gap: 8px;
        width: 100%;
        padding: 1rem;
        background-color: var(--secondary-bg);
        border-radius: 1rem;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
      }

      input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 24px;
        height: 24px;
        background-color: var(--checkbox-bg);
        border: 2px solid var(--checkbox-border);
        border-radius: 6px;
        cursor: pointer;
        position: relative;
        transition: all 0.2s ease;
      }

      input[type="checkbox"]:hover:not(:disabled) {
        border-color: var(--accent-green);
        box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
      }

      input[type="checkbox"]:checked {
        background-color: var(--accent-green);
        border-color: var(--accent-green);
      }

      input[type="checkbox"]:checked::after {
        content: '';
        position: absolute;
        left: 7px;
        top: 3px;
        width: 5px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      input[type="checkbox"]:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }
      
      .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255,255,255,.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
        display: none;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>1 Million CheckBoxes</h1>
      <div class="auth-section">
        <div class="loading-spinner" id="auth-spinner"></div>
        <span id="user-info"></span>
        <button id="login-btn" class="btn btn-primary">Login to Check</button>
        <button id="logout-btn" class="btn btn-outline" style="display: none;">Logout</button>
      </div>
    </header>

    <main>
      <div id="status-banner" class="status-banner">
        You are in view-only mode. Please login to interact with the checkboxes.
      </div>
      <div id="container"></div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="index.js"></script>
  </body>
</html>
